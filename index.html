<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马年心愿卡 · 信息收集</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f9eee0 0%, #f5e0cd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Sans', system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .main-card {
            max-width: 860px;
            width: 100%;
            background: rgba(255, 248, 235, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 30px 50px rgba(140, 80, 30, 0.2), 0 0 0 2px #fbe9d2 inset, 0 0 0 4px #b45f2b inset;
            border: 6px solid #e3b38b;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #822b15;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0 #fddfb0, 6px 6px 0 rgba(160, 70, 20, 0.3);
            font-family: 'Trebuchet MS', 'Impact', cursive;
        }

        .subhead {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 400;
            color: #5b2e12;
            background: #f6d5ac;
            display: inline-block;
            padding: 0.3rem 2rem;
            border-radius: 60px;
            margin: 0 auto 30px;
            border: 2px solid #b45f2b;
            box-shadow: 0 4px 0 #824a1f;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-item.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            color: #3d2b16;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .required-star {
            color: #c53131;
            font-size: 1.4rem;
            line-height: 1;
            margin-left: 2px;
        }

        input, textarea {
            background: #fffcf0;
            border: 3px solid #dbaa7a;
            border-radius: 30px;
            padding: 12px 18px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: inset 2px 2px 8px #e9c9ad, 0 2px 0 #9f6d42;
        }

        input:focus, textarea:focus {
            border-color: #ac4d1b;
            background: #fff9e6;
            box-shadow: 0 0 0 4px #fcd19e;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
            border-radius: 28px;
        }

        /* 日期时间输入样式美化 */
        input[type="datetime-local"] {
            color-scheme: light;
            font-family: monospace;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        button {
            background: #f3c896;
            border: none;
            padding: 16px 34px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #351d0b;
            border-radius: 60px;
            border-bottom: 6px solid #9f622e;
            border-right: 4px solid #b4763c;
            cursor: pointer;
            transition: 0.1s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 7px 0 #86592b, 0 10px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #86592b, 0 8px 12px rgba(0,0,0,0.15);
        }

        button.secondary {
            background: #e2cfb5;
            border-bottom-color: #806a4e;
            box-shadow: 0 7px 0 #68553d;
        }

        .table-section {
            margin-top: 30px;
            background: #ead3ba;
            border-radius: 32px;
            padding: 22px 18px;
            border: 3px solid #af7c53;
        }

        .table-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: #2f1f0e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 4px dotted #b45f2b;
            padding-bottom: 12px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff7e4;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(120, 60, 20, 0.3);
        }

        .data-table th {
            background: #a1662f;
            color: white;
            font-weight: 600;
            padding: 12px 6px;
            font-size: 0.9rem;
            border-right: 1px solid #c59a6b;
        }

        .data-table td {
            padding: 10px 6px;
            border-bottom: 1px solid #dbb58b;
            text-align: center;
            color: #1f1307;
            font-size: 0.85rem;
            word-break: break-word;
        }

        .data-table tr:nth-child(even) {
            background: #faeedc;
        }

        /* 心愿卡浮层 */
        .card-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .wish-card {
            width: 550px;
            max-width: 90vw;
            background: #fff4db;
            border-radius: 60px 60px 40px 40px;
            padding: 35px 30px 35px 30px;
            border: 12px solid #fdcb7a;
            box-shadow: 0 30px 40px #632f0e80, 0 0 0 6px #fff6cf inset;
            text-align: center;
            position: relative;
            background-image: radial-gradient(circle at 30% 40%, #ffdfa0 4px, transparent 4px), 
            radial-gradient(circle at 80% 70%, #ffb882 8px, transparent 8px);
            background-size: 50px 50px, 180px 180px;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 2.5rem;
            background: none;
            border: none;
            color: #a13e1a;
            cursor: pointer;
            padding: 0 10px;
            box-shadow: none;
            border-bottom: none;
        }
        .close-btn:active { transform: scale(0.9); }

        .horse-year {
            font-size: 3rem;
            filter: drop-shadow(2px 4px 4px #ad6d39);
            margin: 10px 0 0;
        }

        .card-content {
            font-size: 1.3rem;
            color: #2e1b0b;
            margin: 20px 0;
            line-height: 1.5;
            background: #fdeed8c7;
            border-radius: 40px;
            padding: 20px;
            border: 2px solid #c0874e;
        }

        .card-foot {
            font-size: 1.5rem;
            font-weight: bold;
            color: #7e3d13;
            display: flex;
            justify-content: space-around;
            margin: 15px 0 10px;
        }

        .save-card-btn {
            background: #e09e5d;
            border-bottom: 6px solid #82562b;
            padding: 14px 20px;
            font-size: 1.3rem;
            margin-top: 5px;
            width: 100%;
            justify-content: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>🐎 丙午马年 · 心愿策 🐎</h1>
        <div style="text-align: center;"><span class="subhead">驰骋新程 · 所愿皆达</span></div>

        <!-- 表单部分：收集信息 -->
        <form id="wishForm">
            <div class="form-grid">
                <div class="form-item">
                    <label>*1. 姓名 <span class="required-star">✱</span></label>
                    <input type="text" id="name" placeholder="请输入" required>
                </div>
                <div class="form-item">
                    <label>*2. 班级 <span class="required-star">✱</span></label>
                    <input type="text" id="class" placeholder="请输入" required>
                </div>
                <div class="form-item">
                    <label>*3. 学号 <span class="required-star">✱</span></label>
                    <input type="text" id="studentId" placeholder="请输入" required>
                </div>
                <div class="form-item">
                    <label>*4. 计划内容 <span class="required-star">✱</span></label>
                    <textarea id="plan" placeholder="请输入" required></textarea>
                </div>
                <div class="form-item">
                    <label>5. 现况（针对过程性提升计划）</label>
                    <textarea id="currentSituation" placeholder="请输入"></textarea>
                </div>
                <div class="form-item">
                    <label>*6. 预计完成时间 <span class="required-star">✱</span></label>
                    <input type="datetime-local" id="deadline" required>
                </div>
            </div>

            <div class="button-group">
                <button type="button" id="submitBtn">✨ 生成心愿卡 & 保存 ✨</button>
                <button type="button" id="clearTableBtn" class="secondary">🗑️ 清空表格</button>
            </div>
        </form>

        <!-- 后台表格展示所有提交数据 -->
        <div class="table-section">
            <div class="table-title">📋 马年心愿后台 · 记录表</div>
            <div style="overflow-x: auto;">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>姓名</th><th>班级</th><th>学号</th><th>计划内容</th><th>现况</th><th>预计完成时间</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 动态插入数据 -->
                    </tbody>
                </table>
            </div>
            <p style="margin-top: 12px; font-style: italic; color: #5d3b1c;">✨ 总计 <span id="recordCount">0</span> 个心愿</p>
        </div>
    </div>

    <!-- 马年心愿卡弹窗（提交后展示） -->
    <div id="cardOverlay" class="card-overlay">
        <div class="wish-card" id="wishCard">
            <button class="close-btn" id="closeCardBtn">&times;</button>
            <div class="horse-year">🐴 马年大吉 🐴</div>
            <div class="card-content" id="cardContent">
                <!-- 动态填充内容 -->
            </div>
            <div class="card-foot">
                <span>⏳ 2026</span>
                <span>🐎 丙午</span>
            </div>
            <button class="save-card-btn" id="saveCardBtn">⬇️ 保存心愿卡 (图片)</button>
        </div>
    </div>

    <script>
        (function() {
            // 从 localStorage 加载已有数据 (模拟后台表格持久化)
            let submissions = JSON.parse(localStorage.getItem('wishSubmissions')) || [];

            // 渲染表格
            function renderTable() {
                const tbody = document.getElementById('tableBody');
                const countSpan = document.getElementById('recordCount');
                tbody.innerHTML = '';
                if (submissions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="padding: 30px; text-align:center; background: #f6e3cf;">暂无心愿记录，快写下你的第一个马年心愿吧✨</td></tr>';
                    countSpan.innerText = '0';
                    return;
                }
                submissions.forEach(sub => {
                    const row = document.createElement('tr');
                    // 处理日期显示格式：将 "2025-04-01T15:30" 转为更友好的格式
                    let formattedDate = sub.deadline || '';
                    if (formattedDate) {
                        formattedDate = formattedDate.replace('T', ' ');
                    }
                    row.innerHTML = `
                        <td>${escapeHtml(sub.name || '')}</td>
                        <td>${escapeHtml(sub.class || '')}</td>
                        <td>${escapeHtml(sub.studentId || '')}</td>
                        <td>${escapeHtml(sub.plan || '')}</td>
                        <td>${escapeHtml(sub.currentSituation || '')}</td>
                        <td>${escapeHtml(formattedDate)}</td>
                    `;
                    tbody.appendChild(row);
                });
                countSpan.innerText = submissions.length;
            }

            // 简单防XSS
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            // 保存到 localStorage 并刷新表格
            function saveSubmissions() {
                localStorage.setItem('wishSubmissions', JSON.stringify(submissions));
                renderTable();
            }

            // 清空表格
            document.getElementById('clearTableBtn').addEventListener('click', function() {
                if (submissions.length > 0 && confirm('确定清空所有心愿记录吗？')) {
                    submissions = [];
                    saveSubmissions();
                }
            });

            // 表单提交逻辑
            document.getElementById('submitBtn').addEventListener('click', function() {
                // 获取必填字段
                const name = document.getElementById('name').value.trim();
                const className = document.getElementById('class').value.trim();
                const studentId = document.getElementById('studentId').value.trim();
                const plan = document.getElementById('plan').value.trim();
                const currentSituation = document.getElementById('currentSituation').value.trim();
                const deadline = document.getElementById('deadline').value;

                // 验证必填
                if (!name || !className || !studentId || !plan || !deadline) {
                    alert('请完整填写带 * 的必填项 (姓名、班级、学号、计划内容、预计完成时间)');
                    return;
                }

                // 构建数据对象
                const newEntry = {
                    name: name,
                    class: className,
                    studentId: studentId,
                    plan: plan,
                    currentSituation: currentSituation || '(未填写)',
                    deadline: deadline,
                    timestamp: new Date().toISOString()
                };

                // 加入数组并保存
                submissions.push(newEntry);
                saveSubmissions();

                // 生成心愿卡内容并展示浮层
                generateWishCard(newEntry);

                // 清空表单（可自定义是否清空，此处清空便于快速输入下一个）
                document.getElementById('wishForm').reset();
                // 清空后可以给一个日期默认值（可选不操作）
            });

            // 生成心愿卡 HTML 内容 (展示在弹窗)
            function generateWishCard(entry) {
                const cardContentDiv = document.getElementById('cardContent');
                // 格式化日期显示
                let dateDisplay = entry.deadline.replace('T', ' ').substring(0,16); // 显示到分钟
                const html = `
                    <div style="font-size:2rem; margin-bottom:6px;">🎐</div>
                    <div><strong style="font-size:1.7rem;">${escapeHtml(entry.name)}</strong> 同学</div>
                    <div>🏫 ${escapeHtml(entry.class)} · ${escapeHtml(entry.studentId)}</div>
                    <div style="border-top:2px dashed #d98f4c; margin:12px 0; padding:8px;">📋 心愿计划:<br>“${escapeHtml(entry.plan)}”</div>
                    <div>🌸 现况: ${escapeHtml(entry.currentSituation)}</div>
                    <div style="margin-top:12px;">⏰ 预计完成: ${escapeHtml(dateDisplay)}</div>
                    <div style="margin-top:12px;">🐎 丙午马年 · 一马当先</div>
                `;
                cardContentDiv.innerHTML = html;
                // 显示浮层
                document.getElementById('cardOverlay').style.display = 'flex';
            }

            // 关闭心愿卡
            document.getElementById('closeCardBtn').addEventListener('click', function() {
                document.getElementById('cardOverlay').style.display = 'none';
            });
            // 点击overlay背景关闭
            document.getElementById('cardOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.style.display = 'none';
                }
            });

            // 保存心愿卡为图片 (使用html2canvas)
            // 先检查是否已加载库，若未加载则动态加载
            function loadHtml2Canvas(callback) {
                if (typeof html2canvas !== 'undefined') {
                    callback();
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.onload = callback;
                document.head.appendChild(script);
            }

            document.getElementById('saveCardBtn').addEventListener('click', function() {
                const cardElement = document.getElementById('wishCard');
                // 临时隐藏关闭按钮，避免截进去
                const closeBtn = document.getElementById('closeCardBtn');
                closeBtn.style.visibility = 'hidden';

                loadHtml2Canvas(function() {
                    html2canvas(cardElement, {
                        scale: 1.8,
                        backgroundColor: '#fff4db',
                        allowTaint: false,
                        useCORS: true,
                        logging: false
                    }).then(canvas => {
                        // 恢复关闭按钮
                        closeBtn.style.visibility = 'visible';
                        // 下载图片
                        const link = document.createElement('a');
                        link.download = `马年心愿卡_${new Date().getTime()}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    }).catch(error => {
                        closeBtn.style.visibility = 'visible';
                        alert('生成图片失败，但心愿已保存。' + error);
                    });
                });
            });

            // 初始渲染表格
            renderTable();

            // 为日期输入框设置一个初始默认值：当前时间+7天
            const now = new Date();
            now.setDate(now.getDate() + 7);
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2,'0');
            const day = String(now.getDate()).padStart(2,'0');
            const hours = String(now.getHours()).padStart(2,'0');
            const minutes = String(now.getMinutes()).padStart(2,'0');
            const defaultDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
            document.getElementById('deadline').value = defaultDateTime;
        })();
    </script>
    <!-- html2canvas 备用链接（若cdn失效，但代码中有动态加载） -->
    <!-- 预加载备用 -->
</body>
</html>
